<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Nur Rahma</title>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>
  <link rel="stylesheet" href="portofolio.css" />
</head>
<body>
  <header class="header">
    <div class="logo">Nur Rahma</div>
    <nav>
      <ul class="nav-links">
        <li><a href="portofolio.html">Home</a></li>
        <li><a href="portofolio.html">About</a></li>
        <li><a href="portofolio.html">Services</a></li>
        <li><a href="index.html#projects">Projects</a></li>
      </ul>
    </nav>
  </header>

  <section class="contact-section">
    <h2>Contact Me</h2>
    <p class="contact-description">Let's connect! Feel free to reach out for collaboration or just say hello 👋</p>
    <form class="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>

  <footer class="footer">
    <p>&copy; 2025 Nur Rahma</p>
  </footer>
</body>
</html>
